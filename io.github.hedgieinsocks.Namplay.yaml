app-id: io.github.hedgieinsocks.Namplay
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: namplay
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --filesystem=xdg-run/pipewire-0
  - --filesystem=home:ro
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/namplay/cargo
modules:
  - name: blueprint-compiler
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.gnome.org/jwestman/blueprint-compiler
        tag: v0.22.2
  - name: namplay
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - cargo build --release
      - install -Dm755 target/release/namplay /app/bin/namplay
      - install -Dm644 data/io.github.hedgieinsocks.Namplay.desktop /app/share/applications/io.github.hedgieinsocks.Namplay.desktop
      - install -Dm644 data/io.github.hedgieinsocks.Namplay.png /app/share/icons/hicolor/128x128/apps/io.github.hedgieinsocks.Namplay.png
      - install -Dm644 data/io.github.hedgieinsocks.Namplay.gschema.xml /app/share/glib-2.0/schemas/io.github.hedgieinsocks.Namplay.gschema.xml
      - glib-compile-schemas /app/share/glib-2.0/schemas
    sources:
      - type: dir
        path: .
